<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>목소리 메시지 - QR Picture</title>
  <meta property="og:title" content="목소리 메시지">
  <meta property="og:description" content="QR Picture로 전달된 음성 메시지입니다.">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #FFF8F0 0%, #FFF0D8 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 48px 36px 40px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow:
        0 2px 8px rgba(0,0,0,0.06),
        0 12px 40px rgba(0,0,0,0.10);
    }

    .icon-wrap {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #F5E6C0, #E8D090);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .icon-wrap svg {
      width: 38px;
      height: 38px;
      fill: #8B6914;
    }

    h1 {
      color: #5C4000;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #9B8C6C;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 36px;
    }

    /* 재생 버튼 */
    .play-btn {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, #A07820, #8B6914);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      box-shadow:
        0 4px 16px rgba(139, 105, 20, 0.35),
        0 2px 6px rgba(139, 105, 20, 0.2);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      outline: none;
    }

    .play-btn:hover:not(:disabled) {
      transform: scale(1.06);
      box-shadow: 0 6px 24px rgba(139, 105, 20, 0.45);
    }

    .play-btn:active:not(:disabled) {
      transform: scale(0.95);
    }

    .play-btn:disabled {
      background: #D0C8B0;
      box-shadow: none;
      cursor: default;
    }

    .play-btn.playing {
      background: linear-gradient(135deg, #E03030, #CC0000);
      box-shadow:
        0 4px 16px rgba(204, 0, 0, 0.35),
        0 2px 6px rgba(204, 0, 0, 0.2);
    }

    .play-btn svg {
      width: 34px;
      height: 34px;
      fill: white;
    }

    /* 진행 바 */
    .progress-wrap {
      width: 100%;
      background: #F0EBE0;
      border-radius: 4px;
      height: 4px;
      margin: 8px 0 16px;
      overflow: hidden;
      cursor: pointer;
    }

    .progress-bar {
      height: 100%;
      background: #8B6914;
      border-radius: 4px;
      width: 0%;
      transition: width 0.1s linear;
    }

    /* 시간 표시 */
    .time-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #B0A080;
      margin-bottom: 20px;
    }

    .status {
      font-size: 14px;
      color: #9B8C6C;
      min-height: 20px;
    }

    .status.error { color: #CC0000; }
    .status.loading { color: #8B6914; }
    .status.playing { color: #5C7A00; }

    .date {
      color: #C0B090;
      font-size: 12px;
      margin-top: 16px;
    }

    .footer {
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid #F0EBE0;
      color: #C0B090;
      font-size: 11px;
    }

    audio { display: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .loading-anim { animation: pulse 1.2s ease-in-out infinite; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24">
        <path d="M12 15c1.66 0 3-1.34 3-3V6c0-1.66-1.34-3-3-3S9 4.34 9 6v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V6zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-2.08c3.39-.49 6-3.39 6-6.92h-2z"/>
      </svg>
    </div>

    <h1>목소리 메시지</h1>
    <p class="subtitle" id="subtitle">QR Picture로 전달된<br>음성 메시지입니다</p>

    <button class="play-btn" id="playBtn" onclick="togglePlay()" disabled>
      <svg id="playIcon" viewBox="0 0 24 24">
        <path d="M8 5v14l11-7z"/>
      </svg>
    </button>

    <div class="progress-wrap" id="progressWrap" onclick="seekAudio(event)">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="time-row">
      <span id="currentTime">0:00</span>
      <span id="totalTime">0:00</span>
    </div>

    <p class="status loading-anim" id="status">음성을 불러오는 중...</p>
    <p class="date" id="dateText"></p>

    <audio id="audioPlayer" preload="metadata"></audio>

    <div class="footer">
      🎙️ QR Picture
    </div>
  </div>

  <script>
    const PROJECT_ID = 'qrpicture-80247';

    const audio = document.getElementById('audioPlayer');
    const playBtn = document.getElementById('playBtn');
    const playIcon = document.getElementById('playIcon');
    const statusEl = document.getElementById('status');
    const progressBar = document.getElementById('progressBar');
    const currentTimeEl = document.getElementById('currentTime');
    const totalTimeEl = document.getElementById('totalTime');

    let isPlaying = false;

    // URL에서 id 파라미터 추출
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    if (!id) {
      setError('잘못된 링크입니다.');
    } else {
      loadAudio(id);
    }

    async function loadAudio(id) {
      try {
        // Firestore REST API로 오디오 문서 조회
        const firestoreUrl =
          `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/audios/${id}`;

        const res = await fetch(firestoreUrl);
        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }

        const data = await res.json();
        const audioUrl = data.fields?.url?.stringValue;
        if (!audioUrl) throw new Error('url not found');

        // 날짜 표시
        const ts = data.fields?.createdAt?.timestampValue;
        if (ts) {
          const d = new Date(ts);
          document.getElementById('dateText').textContent =
            d.toLocaleDateString('ko-KR', {
              year: 'numeric', month: 'long', day: 'numeric'
            });
        }

        // 오디오 로드
        audio.src = audioUrl;
        audio.load();
        playBtn.disabled = false;
        setStatus('재생 버튼을 눌러주세요', '');
        statusEl.classList.remove('loading-anim');
      } catch (e) {
        setError('음성을 불러올 수 없습니다.');
        console.error(e);
      }
    }

    function togglePlay() {
      if (isPlaying) {
        audio.pause();
        audio.currentTime = 0;
        setPlayState(false);
      } else {
        audio.play()
          .then(() => setPlayState(true))
          .catch(err => {
            setError('재생에 실패했습니다. 다시 시도해 주세요.');
            console.error(err);
          });
      }
    }

    function setPlayState(playing) {
      isPlaying = playing;
      playBtn.className = 'play-btn' + (playing ? ' playing' : '');
      if (playing) {
        playIcon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
        setStatus('재생 중...', 'playing');
      } else {
        playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
        setStatus('재생 버튼을 눌러주세요', '');
      }
    }

    function setError(msg) {
      statusEl.textContent = msg;
      statusEl.className = 'status error';
      statusEl.classList.remove('loading-anim');
      playBtn.disabled = true;
    }

    function setStatus(msg, cls) {
      statusEl.textContent = msg;
      statusEl.className = 'status' + (cls ? ' ' + cls : '');
    }

    function formatTime(secs) {
      if (isNaN(secs)) return '0:00';
      const m = Math.floor(secs / 60);
      const s = Math.floor(secs % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    function seekAudio(e) {
      if (!audio.duration) return;
      const rect = e.currentTarget.getBoundingClientRect();
      const ratio = (e.clientX - rect.left) / rect.width;
      audio.currentTime = ratio * audio.duration;
    }

    // 오디오 이벤트
    audio.addEventListener('ended', () => setPlayState(false));

    audio.addEventListener('timeupdate', () => {
      if (!audio.duration) return;
      const pct = (audio.currentTime / audio.duration) * 100;
      progressBar.style.width = pct + '%';
      currentTimeEl.textContent = formatTime(audio.currentTime);
    });

    audio.addEventListener('durationchange', () => {
      totalTimeEl.textContent = formatTime(audio.duration);
    });

    audio.addEventListener('error', () => {
      setError('재생 오류가 발생했습니다.');
      setPlayState(false);
    });
  </script>
</body>
</html>
