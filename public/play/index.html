<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Message – DearVoice</title>
  <meta property="og:title" content="Voice Message – DearVoice">
  <meta property="og:description" content="A voice message delivered via DearVoice.">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 44px 32px 36px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow:
        0 2px 8px rgba(0,0,0,0.06),
        0 12px 40px rgba(0,0,0,0.10);
    }

    .preview-wrap {
      display: none;
      margin-bottom: 20px;
      text-align: left;
    }

    .preview-label {
      color: #8f8267;
      font-size: 12px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .preview-frame {
      width: 85%;
      max-width: 260px;
      min-width: 160px;
      margin: 0 auto;
      position: relative;
    }

    .preview-image {
      width: 100%;
      height: auto;
      object-fit: contain;
      border-radius: 16px;
      display: block;
      background: #eeeeee;
      border: 1px solid #f0f0f0;
    }

    .preview-image.is-loading {
      opacity: 0;
    }

    .preview-loader {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      background: #f7f7f7;
      color: #8f8267;
      font-size: 12px;
      line-height: 1.4;
      text-align: center;
      padding: 12px;
      border: 1px solid #f0f0f0;
    }

    .preview-loader.hidden {
      display: none;
    }

    .icon-wrap {
      width: 76px;
      height: 76px;
      background: #000000;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .icon-wrap svg {
      width: 36px;
      height: 36px;
      fill: #ffffff;
    }

    h1 {
      color: #000000;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #666666;
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .play-btn {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      background: #000000;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      outline: none;
    }

    .play-btn:hover:not(:disabled) {
      transform: scale(1.06);
      box-shadow: 0 6px 24px rgba(0,0,0,0.35);
    }

    .play-btn:active:not(:disabled) {
      transform: scale(0.95);
    }

    .play-btn:disabled {
      background: #cccccc;
      box-shadow: none;
      cursor: default;
    }

    .play-btn.playing {
      background: #222222;
    }

    .play-btn svg {
      width: 34px;
      height: 34px;
      fill: white;
    }

    .progress-wrap {
      width: 100%;
      background: #eeeeee;
      border-radius: 4px;
      height: 4px;
      margin: 8px 0 14px;
      overflow: hidden;
      cursor: pointer;
    }

    .progress-bar {
      height: 100%;
      background: #000000;
      border-radius: 4px;
      width: 0%;
      transition: width 0.1s linear;
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #999999;
      margin-bottom: 18px;
    }

    .status {
      font-size: 13px;
      color: #666666;
      min-height: 20px;
    }

    .status.error { color: #cc0000; }
    .status.loading { color: #333333; }
    .status.playing { color: #000000; font-weight: 500; }

    .date {
      color: #aaaaaa;
      font-size: 12px;
      margin-top: 14px;
    }

    .footer {
      margin-top: 28px;
      padding-top: 18px;
      border-top: 1px solid #eeeeee;
      color: #bbbbbb;
      font-size: 11px;
    }

    audio { display: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .loading-anim { animation: pulse 1.2s ease-in-out infinite; }
  </style>
</head>
<body>
  <div class="card">
    <div class="preview-wrap" id="previewWrap">
      <div class="preview-label" id="previewLabel"></div>
      <div class="preview-frame">
        <div class="preview-loader hidden" id="previewLoader"></div>
        <img class="preview-image" id="previewImage" alt="">
      </div>
    </div>

    <h1 id="titleText"></h1>
    <p class="subtitle" id="subtitle"></p>

    <button class="play-btn" id="playBtn" onclick="togglePlay()" disabled>
      <svg id="playIcon" viewBox="0 0 24 24">
        <path d="M8 5v14l11-7z"/>
      </svg>
    </button>

    <div class="progress-wrap" id="progressWrap" onclick="seekAudio(event)">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="time-row">
      <span id="currentTime">0:00</span>
      <span id="totalTime">0:00</span>
    </div>

    <p class="status loading-anim" id="status"></p>
    <p class="date" id="dateText"></p>

    <audio id="audioPlayer" preload="metadata"></audio>

    <div class="footer">DearVoice</div>
  </div>

  <script>
    const PROJECT_ID = 'qrpicture-80247';

    const isKo = (navigator.language || navigator.userLanguage || 'en')
      .toLowerCase().startsWith('ko');

    const T = {
      title:       isKo ? '목소리 메시지'              : 'Voice Message',
      subtitle:    isKo ? 'DearVoice로 전달된\n음성 메시지입니다' : 'A voice message\ndelivered via DearVoice',
      loading:     isKo ? '음성을 불러오는 중...'       : 'Loading audio...',
      ready:       isKo ? '재생 버튼을 눌러주세요'      : 'Press play to listen',
      playing:     isKo ? '재생 중...'                  : 'Playing...',
      errInvalid:  isKo ? '잘못된 링크입니다.'          : 'Invalid link.',
      errLoad:     isKo ? '음성을 불러올 수 없습니다.'  : 'Unable to load audio.',
      errPlay:     isKo ? '재생에 실패했습니다. 다시 시도해 주세요.' : 'Playback failed. Please try again.',
      errAudio:    isKo ? '재생 오류가 발생했습니다.'   : 'Playback error occurred.',
      preview:     isKo ? '사진 미리보기'              : 'Photo Preview',
      previewAlt:  isKo ? '사진 미리보기'              : 'Photo preview',
      loadingPhoto:isKo ? '사진 불러오는 중...'       : 'Loading preview...',
    };

    document.getElementById('titleText').textContent = T.title;
    document.getElementById('subtitle').innerHTML = T.subtitle.replace('\n', '<br>');
    document.getElementById('status').textContent = T.loading;
    document.getElementById('previewLabel').textContent = T.preview;
    document.title = T.title + ' – DearVoice';

    const audio         = document.getElementById('audioPlayer');
    const playBtn       = document.getElementById('playBtn');
    const playIcon      = document.getElementById('playIcon');
    const statusEl      = document.getElementById('status');
    const progressBar   = document.getElementById('progressBar');
    const currentTimeEl = document.getElementById('currentTime');
    const totalTimeEl   = document.getElementById('totalTime');
    const previewWrap   = document.getElementById('previewWrap');
    const previewImage  = document.getElementById('previewImage');
    const previewLoader = document.getElementById('previewLoader');

    previewLoader.textContent = T.loadingPhoto;

    let isPlaying = false;

    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    if (!id) {
      setError(T.errInvalid);
    } else {
      loadAudio(id);
    }

    async function loadAudio(id) {
      try {
        const firestoreUrl =
          `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/audios/${id}`;

        const res = await fetch(firestoreUrl);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        const audioUrl = data.fields?.url?.stringValue;
        const previewUrl = data.fields?.previewImageUrl?.stringValue;
        if (!audioUrl) throw new Error('url not found');

        if (previewUrl) {
          previewLoader.classList.remove('hidden');
          previewImage.classList.add('is-loading');
          previewImage.src = previewUrl;
          previewImage.alt = T.previewAlt;
          previewWrap.style.display = 'block';
        }

        const ts = data.fields?.createdAt?.timestampValue;
        if (ts) {
          const d = new Date(ts);
          const locale = isKo ? 'ko-KR' : 'en-US';
          document.getElementById('dateText').textContent =
            d.toLocaleDateString(locale, {
              year: 'numeric', month: 'long', day: 'numeric'
            });
        }

        audio.src = audioUrl;
        audio.load();
      } catch (e) {
        setError(T.errLoad);
        console.error(e);
      }
    }

    function togglePlay() {
      if (isPlaying) {
        audio.pause();
        audio.currentTime = 0;
        setPlayState(false);
      } else {
        audio.play()
          .then(() => setPlayState(true))
          .catch(err => {
            setError(T.errPlay);
            console.error(err);
          });
      }
    }

    function setPlayState(playing) {
      isPlaying = playing;
      playBtn.className = 'play-btn' + (playing ? ' playing' : '');
      if (playing) {
        playIcon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
        setStatus(T.playing, 'playing');
      } else {
        playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
        setStatus(T.ready, '');
      }
    }

    function setError(msg) {
      statusEl.textContent = msg;
      statusEl.className = 'status error';
      statusEl.classList.remove('loading-anim');
      playBtn.disabled = true;
    }

    function setStatus(msg, cls) {
      statusEl.textContent = msg;
      statusEl.className = 'status' + (cls ? ' ' + cls : '');
      statusEl.classList.toggle('loading-anim', cls === 'loading');
    }

    function formatTime(secs) {
      if (isNaN(secs)) return '0:00';
      const m = Math.floor(secs / 60);
      const s = Math.floor(secs % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    function seekAudio(e) {
      if (!audio.duration) return;
      const rect = e.currentTarget.getBoundingClientRect();
      const ratio = (e.clientX - rect.left) / rect.width;
      audio.currentTime = ratio * audio.duration;
    }

    audio.addEventListener('ended', () => setPlayState(false));

    audio.addEventListener('timeupdate', () => {
      if (!audio.duration) return;
      const pct = (audio.currentTime / audio.duration) * 100;
      progressBar.style.width = pct + '%';
      currentTimeEl.textContent = formatTime(audio.currentTime);
    });

    audio.addEventListener('durationchange', () => {
      totalTimeEl.textContent = formatTime(audio.duration);
    });

    audio.addEventListener('loadstart', () => {
      playBtn.disabled = true;
      setStatus(T.loading, 'loading');
    });

    audio.addEventListener('canplay', () => {
      playBtn.disabled = false;
      setStatus(T.ready, '');
    });

    audio.addEventListener('error', () => {
      setError(T.errAudio);
      setPlayState(false);
    });

    previewImage.addEventListener('load', () => {
      previewLoader.classList.add('hidden');
      previewImage.classList.remove('is-loading');
    });

    previewImage.addEventListener('error', () => {
      previewLoader.textContent = T.errLoad;
      previewLoader.classList.remove('hidden');
      previewImage.classList.add('is-loading');
    });
  </script>
</body>
</html>
