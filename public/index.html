<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Picture</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #FFF8F0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 360px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    }
    h1 { color: #5C4000; margin-bottom: 8px; }
    p { color: #9B8C6C; }
  </style>
</head>
<body>
  <div class="card">
    <div style="font-size:64px; margin-bottom:16px;">📷</div>
    <h1>QR Picture</h1>
    <p>사진 속 QR 코드를 스캔해서<br>목소리를 들어보세요.</p>
  </div>
</body>
</html>
